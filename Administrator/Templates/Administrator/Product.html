{% extends 'Administrator/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>

<body>
    <form action="" method="post">
        <div class="container-fluid pt-4 px-4">

            <div class="row g-4">

                <!-- Product Form -->
                <div class="col-sm-12 col-xl-5">

                    <div class="bg-light rounded p-4 shadow-sm">

                        <h4 class="mb-4 text-dark">
                            <i class="fa fa-box me-2 text-primary"></i>
                            Product Management
                        </h4>

                        <form action="" method="post" enctype="multipart/form-data">
                            {% csrf_token %}

                            <!-- Category -->
                            <div class="mb-3">

                                <label class="form-label fw-bold">Category</label>

                                <select name="Category" class="form-select" required>
                                    <option value="">-- Select Category --</option>
                                </select>

                            </div>

                            <!-- Sub Category -->
                            <div class="mb-3">

                                <label class="form-label fw-bold">Sub Category</label>

                                <select name="SubCategory" class="form-select" required>
                                    <option value="">-- Select Sub Category --</option>
                                </select>

                            </div>

                            <!-- Product Name -->
                            <div class="mb-3">

                                <label class="form-label fw-bold">Product Name</label>

                                <input type="text" name="product_name" class="form-control"
                                    placeholder="Enter Product Name" required>

                            </div>

                            <!-- Price -->
                            <div class="mb-3">

                                <label class="form-label fw-bold">Price</label>

                                <input type="number" name="price" class="form-control" placeholder="Enter Price" min="1"
                                    required>

                            </div>

                            <!-- Image -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">Product Image</label>

                                <input type="file" name="photo" class="form-control" accept="image/*" required>

                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2">

                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="fa fa-save me-2"></i> Submit
                                </button>

                                <button type="reset" class="btn btn-secondary px-4">
                                    <i class="fa fa-times me-2"></i> Cancel
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

                <!-- Product List Placeholder -->
                <div class="col-sm-12 col-xl-7">

                    <div class="bg-light rounded p-4 shadow-sm">

                        <h4 class="mb-4 text-dark">
                            <i class="fa fa-list me-2 text-success"></i>
                            Product List
                        </h4>

                        <div class="text-muted text-center py-5">
                            Product table will appear here 👇
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </form>
</body>

</html>
{% endblock content %}
