{% extends 'Administrator/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>

<body>
    <form action="" method="post">
        <div class="col-sm-12 col-xl-6">
            <div class="bg-light rounded h-100 p-4">
                <table class="table table-striped" border="2">
                    <tr>
                        <td>Category</td>
                        <td>
                            <select name="Category" id="" required>
                                <option>--select--</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Sub Category</td>
                        <td>
                            <select name="Sub Category" id="" required>
                                <option value="">--select--</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Product Name</td>
                        <td><input type="text" name="" id="" required></td>
                    </tr>
                    <tr>
                        <td>Price</td>
                        <td><input type="number" name="" id="" required pattern="^[1-9][0-9]*$"
                                title="Price must contain only numbers and should be greater than 0"></td>
                    </tr>
                    <tr>
                        <td>image</td>
                        <td><input type="file" name="photo" id="" accept="image/*" required></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Submit">
                            <input type="reset" value="Cancel">
                        </td>
                    </tr>
                </table>
    </form>
</body>

</html>
{% endblock content %}
