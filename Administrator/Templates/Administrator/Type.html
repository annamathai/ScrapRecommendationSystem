{% extends 'Administrator/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type</title>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}<div class="col-sm-12 col-xl-6">
            <div class="container-fluid pt-4 px-4">

                <div class="row g-4">

                    <!-- Type Form -->
                    <div class="col-sm-12 col-xl-5">

                        <div class="bg-light rounded p-4 shadow-sm">

                            <h4 class="mb-4 text-dark">
                                <i class="fa fa-tags me-2 text-primary"></i>
                                Type Management
                            </h4>

                            <form action="" method="post">
                                {% csrf_token %}

                                <!-- Type Name -->
                                <div class="mb-4">

                                    <label class="form-label fw-bold">
                                        Type Name
                                    </label>

                                    <input type="text" name="txt_type" class="form-control"
                                        value="{{editdata.type_name}}" placeholder="Enter Type Name" required>

                                </div>

                                <!-- Buttons -->
                                <div class="d-flex gap-2">

                                    <button type="submit" class="btn btn-primary px-4">

                                        <i class="fa fa-save me-2"></i>
                                        Submit

                                    </button>

                                    <button type="reset" class="btn btn-secondary px-4">

                                        <i class="fa fa-times me-2"></i>
                                        Cancel

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                    <!-- Type Table -->
                    <div class="col-sm-12 col-xl-7">

                        <div class="bg-light rounded p-4 shadow-sm">

                            <h4 class="mb-4 text-dark">
                                <i class="fa fa-list me-2 text-success"></i>
                                Type List
                            </h4>

                            <div class="table-responsive">

                                <table class="table table-hover align-middle">

                                    <thead class="table-dark">
                                        <tr>
                                            <th>S.No</th>
                                            <th>Type</th>
                                            <th class="text-center">Action</th>
                                        </tr>
                                    </thead>

                                    <tbody>

                                        {% for i in typedata %}
                                        <tr>

                                            <td>{{forloop.counter}}</td>

                                            <td>
                                                {{i.type_name}}
                                            </td>

                                            <td class="text-center">

                                                <a href="{% url 'Administrator:edittype' i.id %}"
                                                    class="btn btn-sm btn-warning">

                                                    <i class="fa fa-edit"></i>

                                                </a>

                                                <a href="{% url 'Administrator:deltype' i.id %}"
                                                    class="btn btn-sm btn-danger"
                                                    onclick="return confirm('Are you sure you want to delete this type?')">

                                                    <i class="fa fa-trash"></i>

                                                </a>

                                            </td>

                                        </tr>

                                        {% empty %}

                                        <tr>
                                            <td colspan="3" class="text-center text-muted py-4">

                                                No Types Added

                                            </td>
                                        </tr>

                                        {% endfor %}

                                    </tbody>

                                </table>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Administrator:Type' %}"
</script>
{% endif %}
{% endblock content %}
