{% extends 'Scrapcenter/Header.html' %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}
        <section class="ftco-section bg-light">
            <div class="container">

                <div class="row justify-content-center">

                    <div class="col-md-6">

                        <div class="card shadow-lg border-0 rounded-lg">

                            <div class="card-header bg-dark text-white text-center py-4">
                                <h2 class="mb-0">
                                    <i class="fa fa-lock mr-2"></i>
                                    Change Password
                                </h2>
                            </div>

                            <div class="card-body p-5">

                                <form action="" method="post">
                                    {% csrf_token %}

                                    <!-- OLD PASSWORD -->
                                    <div class="form-group mb-4">
                                        <label class="font-weight-bold">
                                            Old Password
                                        </label>

                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text bg-warning text-white">
                                                    <i class="fa fa-key"></i>
                                                </span>
                                            </div>

                                            <input type="password" name="txt_opassword" class="form-control" required
                                                placeholder="Enter Your Old Password"
                                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                                title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                                        </div>
                                    </div>

                                    <!-- NEW PASSWORD -->
                                    <div class="form-group mb-4">
                                        <label class="font-weight-bold">
                                            New Password
                                        </label>

                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text bg-warning text-white">
                                                    <i class="fa fa-lock"></i>
                                                </span>
                                            </div>

                                            <input type="password" name="txt_npassword" class="form-control" required
                                                placeholder="Enter Your New Password"
                                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                                title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                                        </div>
                                    </div>

                                    <!-- CONFIRM PASSWORD -->
                                    <div class="form-group mb-4">
                                        <label class="font-weight-bold">
                                            Confirm Password
                                        </label>

                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text bg-warning text-white">
                                                    <i class="fa fa-check-circle"></i>
                                                </span>
                                            </div>

                                            <input type="password" name="txt_cpassword" class="form-control" required
                                                placeholder="Confirm Your Password"
                                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                                title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                                        </div>
                                    </div>

                                    <!-- BUTTONS -->
                                    <div class="text-center mt-5">

                                        <button type="submit" class="btn btn-warning px-5 py-2 mr-3">
                                            <i class="fa fa-save mr-2"></i>
                                            Submit
                                        </button>

                                        <button type="reset" class="btn btn-dark px-5 py-2">
                                            <i class="fa fa-times mr-2"></i>
                                            Cancel
                                        </button>

                                    </div>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </section>

    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Scrapcenter:ChangePassword' %}"
</script>
{% endif %}

{% endblock content %}
