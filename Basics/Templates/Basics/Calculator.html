<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
    <table  border="2" align="center">
        <tr>
            <td>Number 1:</td>
            <td><input type="text" name="txt_num1" id=""></td>
        </tr>
        <tr>
            <td>Number 2:</td>
            <td><input type="text" name="txt_num2" id=""></td>
        </tr>
        <tr>
            <td colspan="4">
                <input type="submit" value="Add" name="calc">
                <input type="submit" value="Subtract" name="calc">
                <input type="submit" value="Division" name="calc">
                <input type="submit" value="Multiplication" name="calc">
            </td>
        </tr>
        <tr>
            <td>Result:</td>
            <td>{{result}}</td>
        </tr>
    </table>
    </form>
</body>
</html>
