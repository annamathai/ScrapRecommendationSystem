{% extends 'Guest/Header.html' %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}
        <section class="container py-1">

            <!-- PAGE TITLE -->
            <!-- <div class="text-center mb-5">

                <h1 class="font-weight-bold">
                    Login
                </h1>

                <p class="text-muted">
                    Access your account securely
                </p>

            </div> -->

            <!-- LOGIN CARD -->
            <div class="row justify-content-center">

                <div class="col-md-6 col-lg-5">

                    <div class="card shadow-lg border-0 rounded-lg overflow-hidden">

                        <!-- CARD HEADER -->
                        <div class="bg-dark text-white text-center py-4">

                            <h3 class="mb-0 text-white">
                                <i class="fa fa-user-circle mr-2"></i>
                                Welcome Back
                            </h3>

                        </div>

                        <!-- CARD BODY -->
                        <div class="card-body p-5">

                            <form action="" method="post">
                                {% csrf_token %}

                                <!-- EMAIL -->
                                <div class="form-group mb-4">

                                    <label class="font-weight-bold">
                                        Email Address
                                    </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text bg-warning text-white">
                                                <i class="fa fa-envelope"></i>
                                            </span>

                                        </div>

                                        <input type="email" name="txt_email" class="form-control" required
                                            placeholder="Enter your email">

                                    </div>

                                </div>

                                <!-- PASSWORD -->
                                <div class="form-group mb-4">

                                    <label class="font-weight-bold">
                                        Password
                                    </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text bg-warning text-white">
                                                <i class="fa fa-lock"></i>
                                            </span>

                                        </div>

                                        <input type="password" name="txt_password" class="form-control" required
                                            placeholder="Enter your password"
                                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">

                                    </div>

                                </div>

                                <!-- BUTTONS -->
                                <div class="text-center mt-5">

                                    <button type="submit" class="btn btn-warning px-5 py-2 mr-2">

                                        <i class="fa fa-sign-in-alt mr-2"></i>
                                        Login
                                    </button>

                                    <button type="reset" class="btn btn-dark px-5 py-2">

                                        <i class="fa fa-times mr-2"></i>
                                        Cancel
                                    </button>

                                </div>

                                <!-- REGISTER -->
                                <div class="text-center mt-4">

                                    <p class="mb-0">

                                        Don't have an account?

                                        <a href="{% url 'Guest:NewUser' %}" class="text-warning font-weight-bold">

                                            Register Here

                                        </a>

                                    </p>

                                    <p class="mb-0">


                                        <a href="{% url 'Guest:forgotpassword' %}" class="text-warning font-weight-bold">

                                            Forgot Password

                                        </a>

                                    </p>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </section>
    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Guest:Login' %}"
</script>
{% endif %}

{% endblock content %}
