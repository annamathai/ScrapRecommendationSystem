{% extends 'Guest/Header.html' %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgotPassword</title>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}
        <section class="container py-5">

            <!-- PAGE TITLE -->
            <div class="text-center mb-5">

                <h1 class="font-weight-bold">
                    Forgot Password
                </h1>

                <p class="text-muted">
                    Enter your registered email to reset your password
                </p>

            </div>

            <!-- FORGOT PASSWORD CARD -->
            <div class="row justify-content-center">

                <div class="col-md-6 col-lg-5">

                    <div class="card shadow-lg border-0 overflow-hidden">

                        <!-- CARD HEADER -->
                        <div class="bg-dark text-white text-center py-4">

                            <h3 class="mb-0">
                                <i class="fa fa-key mr-2"></i>
                                Password Recovery
                            </h3>

                        </div>

                        <!-- CARD BODY -->
                        <div class="card-body p-5">

                            <form action="" method="post">

                                {% csrf_token %}

                                <!-- EMAIL -->
                                <div class="form-group mb-4">

                                    <label class="font-weight-bold">
                                        Registered Email
                                    </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text bg-warning text-white">
                                                <i class="fa fa-envelope"></i>
                                            </span>

                                        </div>

                                        <input type="email" name="txt_email" class="form-control" required
                                            placeholder="Enter your registered email">

                                    </div>

                                </div>

                                <!-- BUTTONS -->
                                <div class="text-center mt-5">

                                    <button type="submit" class="btn btn-warning px-5 py-2 mr-2">

                                        <i class="fa fa-paper-plane mr-2"></i>
                                        Send

                                    </button>

                                    <button type="reset" class="btn btn-dark px-5 py-2">

                                        <i class="fa fa-times mr-2"></i>
                                        Cancel

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Guest:forgotpassword' %}"
</script>
{% endif %}
{% endblock content %}
