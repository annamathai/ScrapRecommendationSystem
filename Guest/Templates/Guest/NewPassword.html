{% extends 'Guest/Header.html' %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewPassword</title>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}
        <section class="container py-5">

            <!-- PAGE TITLE -->
            <div class="text-center mb-5">

                <h1 class="font-weight-bold">
                    Create New Password
                </h1>

                <p class="text-muted">
                    Set a strong password to secure your account
                </p>

            </div>

            <!-- PASSWORD CARD -->
            <div class="row justify-content-center">

                <div class="col-md-6 col-lg-5">

                    <div class="card shadow-lg border-0 overflow-hidden">

                        <!-- CARD HEADER -->
                        <div class="bg-dark text-white text-center py-4">

                            <h3 class="mb-0">
                                <i class="fa fa-lock mr-2"></i>
                                Reset Password
                            </h3>

                        </div>

                        <!-- CARD BODY -->
                        <div class="card-body p-5">

                            <form action="" method="post">

                                {% csrf_token %}

                                <!-- NEW PASSWORD -->
                                <div class="form-group mb-4">

                                    <label class="font-weight-bold">
                                        New Password
                                    </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text bg-warning text-white">
                                                <i class="fa fa-key"></i>
                                            </span>

                                        </div>

                                        <input type="password" name="txt_newpassword" class="form-control" required
                                            placeholder="Enter new password"
                                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">

                                    </div>

                                </div>

                                <!-- CONFIRM PASSWORD -->
                                <div class="form-group mb-4">

                                    <label class="font-weight-bold">
                                        Confirm Password
                                    </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text bg-warning text-white">
                                                <i class="fa fa-check-circle"></i>
                                            </span>

                                        </div>

                                        <input type="password" name="txt_confirmpassword" class="form-control" required
                                            placeholder="Confirm your password"
                                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">

                                    </div>

                                </div>

                                <!-- BUTTONS -->
                                <div class="text-center mt-5">

                                    <button type="submit" class="btn btn-warning px-5 py-2 mr-2">

                                        <i class="fa fa-save mr-2"></i>
                                        Submit

                                    </button>

                                    <button type="reset" class="btn btn-dark px-5 py-2">

                                        <i class="fa fa-times mr-2"></i>
                                        Cancel

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </section>
    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Guest:newpass' %}"
</script>
{% endif %}
{% endblock content %}
