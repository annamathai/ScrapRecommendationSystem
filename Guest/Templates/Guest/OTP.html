{% extends 'Guest/Header.html' %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP</title>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}
        <section class="container py-5">

            <!-- PAGE TITLE -->
            <div class="text-center mb-5">

                <h1 class="font-weight-bold">
                    OTP Verification
                </h1>

                <p class="text-muted">
                    Enter the OTP sent to your registered email
                </p>

            </div>

            <!-- OTP CARD -->
            <div class="row justify-content-center">

                <div class="col-md-5 col-lg-4">

                    <div class="card shadow-lg border-0 overflow-hidden">

                        <!-- CARD HEADER -->
                        <div class="bg-dark text-white text-center py-4">

                            <h3 class="mb-0">
                                <i class="fa fa-shield-alt mr-2"></i>
                                Verify OTP
                            </h3>

                        </div>

                        <!-- CARD BODY -->
                        <div class="card-body p-5">

                            <form action="" method="post">

                                {% csrf_token %}

                                <!-- OTP -->
                                <div class="form-group mb-4">

                                    <label class="font-weight-bold">
                                        One Time Password
                                    </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text bg-warning text-white">
                                                <i class="fa fa-key"></i>
                                            </span>

                                        </div>

                                        <input type="text" name="txt_otp" class="form-control" required maxlength="6"
                                            pattern="[0-9]{6}" placeholder="Enter 6-digit OTP"
                                            title="OTP must contain 6 digits">

                                    </div>

                                </div>

                                <!-- BUTTONS -->
                                <div class="text-center mt-5">

                                    <button type="submit" class="btn btn-warning px-5 py-2 mr-2">

                                        <i class="fa fa-paper-plane mr-2"></i>
                                        Send

                                    </button>

                                    <button type="reset" class="btn btn-dark px-5 py-2">

                                        <i class="fa fa-times mr-2"></i>
                                        Cancel

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Guest:OTP' %}"
</script>
{% endif %}
{% endblock content %}
