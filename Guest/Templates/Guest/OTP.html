<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td>OTP</td>
                <td><input type="text" name="txt_otp" id=""></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Send"> 
                <input type="reset" value="Cancel">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
{% if msg %}
<script>
     alert("{{msg}}");
    window.location="{% url 'Guest:OTP' %}"
</script>
{% endif %}
