{% extends 'Guest/Header.html' %}

{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New User</title>
</head>
<body>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <section class="container py-5">

    <!-- PAGE TITLE -->
    <div class="text-center mb-5">

        <h1 class="font-weight-bold">
            New User Registration
        </h1>

        <p class="text-muted">
            Create your account to continue
        </p>

    </div>

    <!-- REGISTRATION CARD -->
    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow-lg border-0 overflow-hidden">

                <!-- CARD HEADER -->
                <div class="bg-dark text-white text-center py-4">

                    <h3 class="mb-0">
                        <i class="fa fa-user-plus mr-2"></i>
                        Register Account
                    </h3>

                </div>

                <!-- CARD BODY -->
                <div class="card-body p-5">

                    <form action=""
                          method="post"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="row">

                            <!-- NAME -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Full Name
                                    </label>

                                    <input type="text"
                                           name="txt_name"
                                           class="form-control"
                                           required
                                           placeholder="Enter Your Name"
                                           minlength="3"
                                           pattern="^[A-Z]+[a-zA-Z ]*$"
                                           title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter">

                                </div>

                            </div>

                            <!-- CONTACT -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Contact Number
                                    </label>

                                    <input type="text"
                                           name="txt_contact"
                                           class="form-control"
                                           required
                                           placeholder="Enter Your Contact"
                                           minlength="10"
                                           maxlength="10"
                                           pattern="[6-9]{1}[0-9]{9}"
                                           title="Phone number must start with 6-9 and contain 10 digits">

                                </div>

                            </div>

                            <!-- EMAIL -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Email Address
                                    </label>

                                    <input type="email"
                                           name="txt_email"
                                           class="form-control"
                                           required
                                           placeholder="Enter Your Email">

                                </div>

                            </div>

                            <!-- DOB -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Date Of Birth
                                    </label>

                                    <input type="date"
                                           name="DOB"
                                           class="form-control"
                                           required>

                                </div>

                            </div>

                            <!-- PASSWORD -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Password
                                    </label>

                                    <input type="password"
                                           name="txt_password"
                                           class="form-control"
                                           required
                                           placeholder="Enter Password"
                                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                           title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">

                                </div>

                            </div>

                            <!-- CONFIRM PASSWORD -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Confirm Password
                                    </label>

                                    <input type="password"
                                           name="txt_cpassword"
                                           class="form-control"
                                           required
                                           placeholder="Confirm Password"
                                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                           title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">

                                </div>

                            </div>

                            <!-- ADDRESS -->
                            <div class="col-md-12">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Address
                                    </label>

                                    <textarea name="txt_address"
                                              class="form-control"
                                              rows="4"
                                              required
                                              placeholder="Enter Your Address"></textarea>

                                </div>

                            </div>

                            <!-- GENDER -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold d-block">
                                        Gender
                                    </label>

                                    <div class="custom-control custom-radio custom-control-inline">

                                        <input type="radio"
                                               id="male"
                                               name="Gender"
                                               value="Male"
                                               class="custom-control-input"
                                               required>

                                        <label class="custom-control-label"
                                               for="male">

                                            Male

                                        </label>

                                    </div>

                                    <div class="custom-control custom-radio custom-control-inline">

                                        <input type="radio"
                                               id="female"
                                               name="Gender"
                                               value="Female"
                                               class="custom-control-input">

                                        <label class="custom-control-label"
                                               for="female">

                                            Female

                                        </label>

                                    </div>

                                </div>

                            </div>

                            <!-- DISTRICT -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        District
                                    </label>

                                    <select name="sel_district"
                                            id="sel_district"
                                            class="form-control"
                                            required>

                                        <option value="">
                                            -- Select District --
                                        </option>

                                        {% for i in district %}

                                        <option value="{{i.id}}">
                                            {{i.district_name}}
                                        </option>

                                        {% endfor %}

                                    </select>

                                </div>

                            </div>

                            <!-- PLACE -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Place
                                    </label>

                                    <select name="sel_place"
                                            id="sel_place"
                                            class="form-control"
                                            required>

                                        <option value="">
                                            -- Select Place --
                                        </option>

                                    </select>

                                </div>

                            </div>

                            <!-- PHOTO -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        Profile Photo
                                    </label>

                                    <input type="file"
                                           name="user_photo"
                                           class="form-control"
                                           accept="image/*"
                                           required>

                                </div>

                            </div>

                            <!-- PROOF -->
                            <div class="col-md-6">

                                <div class="form-group">

                                    <label class="font-weight-bold">
                                        ID Proof
                                    </label>

                                    <input type="file"
                                           name="user_proof"
                                           class="form-control"
                                           accept="image/*"
                                           required>

                                </div>

                            </div>

                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-5">

                            <button type="submit"
                                    class="btn btn-warning px-5 py-2 mr-2">

                                <i class="fa fa-user-plus mr-2"></i>
                                Register

                            </button>

                            <button type="reset"
                                    class="btn btn-dark px-5 py-2">

                                <i class="fa fa-times mr-2"></i>
                                Cancel

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>
    </form>
</body>
</html>
{% if msg %}
<script>
     alert("{{msg}}");
    window.location="{% url 'Guest:NewUser' %}"
</script>
{% endif %}
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_district").change(function () 
    {
        var did = $(this).val();
        var ur="{% url 'Guest:AjaxPlace' %}"
        $.ajax({
            url: ur,
            data: { did: did, },
            success: function (data) {
                $("#sel_place").html(data);
            },
        });
    });
</script>

{% endblock content %}
